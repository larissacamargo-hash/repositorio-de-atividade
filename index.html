<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meus Progetos</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      /* Aqui você coloca o link da imagem que quer usar como fundo */
      background: url("hello\ kitty4.jpg") no-repeat center center fixed; 
      background-size: cover;
      color: #ff3399;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: rgba(255, 153, 204, 0.85);
      padding: 20px;
      border-bottom: 5px solid #ff66b2;
    }

    header img {
      max-width: 150px;
      margin-bottom: 10px;
      border-radius: 50%;
      border: 3px solid #fff;
    }

    h1 {
      font-size: 2.5em;
      margin: 0;
    }

    p {
      margin: 5px 0;
    }

    .link-list {
      list-style: none;
      padding: 0;
      margin: 30px auto;
      max-width: 400px;
    }

    .link-list li {
      margin: 15px 0;
    }

    .link-list a {
      display: block;
      background-color: rgba(255, 240, 245, 0.9);
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: #ff3399;
      font-weight: bold;
      transition: 0.3s;
      border: 2px solid #ff99cc;
    }

    .link-list a:hover {
      background-color: #ffccdd;
      transform: scale(1.05);
    }

    footer {
      background-color: rgba(255, 153, 204, 0.85);
      padding: 15px;
      margin-top: 30px;
      border-top: 5px solid #ff66b2;
    }
  </style>
</head>
<body>
  <header>
    <img src="hello kitty2.jpg" alt="Hello Kitty estilizada">
    <h1>🌸 Meus Projetos 🌸</h1>
    <p>Organizados com muito carinho 💕</p>
  </header>

  <main>
    <ul class="link-list">
      <li><a href="https://larissacamargo-hash.github.io/teste/teste.html" target="_blank">teste.js</a></li>
      <li><a href="https://github.com/larissacamargo-hash/phyton" target="_blank">Phyton</a></li>
      <li><a href="https://link3.com" target="_blank">Trabalho 3</a></li>
    </ul>
  </main>

  <footer>
    <p>Feito com Amor </p>
  </footer>
</body>
</html>
